front:
  text: 自序夫兵家以料敵制勝醫以料病立方可以取效是集方不繁而門類較全案不文而始未必述意取簡約明淨便於覽觀故稍涉類同悉除不贅先後隨取隨錄無分雜症時邪要惟三時六氣內因外因不內外因之別至若傳經方正傷寒究屬南方罕有吳又可所論之真瘟疫系饑饉之後厲氣所觸二者俱非恆見內錄二三不治之症備為臨證醒目既可慎始慎終並鑑時風之誤余如壞症救逆之方乃苦於不克出治而宗從治反治諸法甚至摩古方而特製者種種之用意系非杜撰所賴平時研究於審證用藥立方三者之要能致夫恰中病情之想妄敢擔任於立方之前要必奏功於服藥之後允稱不負苦心信手而得此即余之樂境也噫後之人豈無羨斯樂者哉留是集以待之古吳愛廬張大爔述壬子初夏後學蘇州黃壽南謹抄
