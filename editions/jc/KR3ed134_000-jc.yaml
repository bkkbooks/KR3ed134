body:
  text: 濕溫金左表熱四候額汗如淋汗時膚涼汗收熱灼消滯泄邪清補諸法已遍嘗矣診脈虛細惟尺獨滑舌苔已淨胃納稍思細繹脈症病情不在三陽而在三陰考仲聖有反發熱一條是寒邪深伏少陰之陽今乃濕溫餘邪流入少陰之陰良亦少年腎氣之不藏所致治當宗其旨變其法以進擬補腎陰泄腎邪一舉兩得可許熱解汗收炒枯熟地五錢枸杞炭一錢炒獨活一錢茯苓三錢五味子七粒細辛三分炒懷膝五分丹皮一錢復診熱解已淨自汗亦收脈滑已和純乎軟弱神情向倦而虛象旋著擬轉補養人參鬚一錢炒杞子一錢懷山藥三錢丹皮一錢五分大熟地五錢炒杜仲三錢生牡蠣七錢澤瀉一錢炒萸肉一錢五分雲苓三錢炙甘草三分蓐勞朱右產後逾年臥床未起胃納雖可脈細如絲聲音笑貌宛若無病之人神志魂魄頻頻不附於體經水五日大沖八日小至循環不淨氣隨呵欠則上越於巔頂隨下泄則陷於下竅自謂斯際一如魂飛天外矣向投補劑等之不服邇月加至大劑膏滋日服全料僅能暫留飛越之態證乃八脈俱損關閘盡撤藥已疲玩蓐勞難挽考內經云上下俱病治其中譬之馬謖之失街亭誤在不守當道耳勉擬純一立中為設關隘俟有險阻可守再商他法藥雖一味四意寓焉炙黑甘草四兩煎湯均三服晝夜勻進復診三進守中和中止血解毒之法其力固勝於雜藥神志較安經水亦止雖有呵欠下泄不至魂飛魄散中流似有砥柱真氣似有收攝然險要暫守關隘未固尚宜重兵防禦擬立中守中和中繼之臺人參一兩真於術三錢炙甘草四兩生白芍三錢煎湯均三服晝夜勻進壽南按以四君守中去茯苓淡滲加生芍斂陰仍以炙草為君藥向效邊求也溲秘陶左中虛濕勝之體病後元氣未復溲秘三月便縮腹硬頻欲小便肛必先墜證如癃秘之苦痛楚難以名狀良因中氣下陷濕隨氣滯傳送之司既失氣化之權亦乏倘徒以滲利氣更墜而下愈窒矣治當補提中氣和其輸化庶幾開合有權運機旋轉則溲自來而痛得緩也應變之法莫作常例人參一錢炒小茴五分酒炒升麻三分酒炒獨活一錢茯苓三錢土炒白朮一錢五分煨木香三分柴胡二分甘草梢三分酒炒香附一錢五分酒炒橘核三錢壽南按譬如以壺貯水壺蓋太吻水為氣攝壺嘴內反滴點不出必將其蓋一泄即注矣故輕用升柴也霍亂鄭左吐瀉驟作無度形肉轉瞬即脫脈伏筋攣體冷汗漬伏邪深入三陰遍體之陽氣頓消脈道不通真氣脫離乃時行轉筋入腹之險證其行速非泛常方藥可恃急進斬關直入之法冀圖一挽奏功淡附子三錢煨肉果一錢淡吳萸三分雲苓三錢細辛三分淡乾薑三錢巴豆炭三分壽南按此方之巴豆炭最有深意者去沉寒痼冷斬關奪門之將也復診吐瀉已止肢體轉溫脈見微細筋絡較舒惟是神倦嗜臥音低畏煩陽回正虛已著急進溫補方缺胃困鄒右病經匝月表熱解後杳不思納脈靜舌淨神倦言懶既無外感留戀又非老景就熟晴光靈動面色開曠閱所服之藥苦寒沉降者多矣良系胃氣為藥所困非病也亦非衰也可笑貴處諸名家為魔障所弄而咸謂老熟不治矣據我管見可許復元且進和中醒中以悅脾胃令其納穀乃昌參鬚五分炒麥冬一錢炒橘白五分生穀芽一兩煎湯代水沙參三錢干霍斛三錢生甘草三分野薔薇露一兩衝入是行也原議診後即返棹病家光景以趕辦後事為亟主人聞余言將信將疑如醉如癡囑伊令甥高如川兄留診一日並邀岸上盤桓余知其意竟諾之令其煮糜粥以備半夜病人思納切囑不可多與壽南按為醫當自出手眼若人云亦云安得為之名手倘黨同伐異乃趨入魔道矣此病乃胃陰虧故宜甘濡復診胃氣乍醒脈形軟弱久飢之後臟腑之氣尚微納穀以勻為穩至於用藥尚利輕靈需俟胃氣日隆方可峻補蓋凡屬補劑亦必藉胃氣四布耳經云百病以胃氣為本又云安穀則昌其斯之謂歟參鬚一錢炒麥冬一錢五分益智四分炙草三分沙參三錢川斛三錢橘白七分云神三錢南棗肉兩枚炒穀芽一兩便秘張右症逾兼旬大便秘結畏冷脈緊詢系病初曾發熱未得汗而驟解解後旬日胃納未慎今則納呆腹脹頻欲大便而不解滯固有諸舌猶白也夫以脈緊舌白畏寒論之表邪未達顯然徒與潤腸何益蓋肺與大腸為表裡表氣尚窒裡氣安望其通治當疏泄上焦仿肺閉意明乎表裡奚致見病治病之惑哉試以表裡二字為同學論之內外一表里也臟腑一表里也手六經足六經一表里也三陽經三陰經一表里也如是而可以盡表裡之義否則未也須知就表而論有表之表表之裡就里而論有里之裡里之表當別即以表裡兩字已難為醫穎壽南按此病乃失表故仍以先表后里耳生麻黃五分前胡一錢炒枳殼一錢陳皮一錢白杏仁三錢桑葉一錢五分紫菀一錢桔梗一錢羌活七分復診表熱外揚汗未暢泄舌白未化脈緊未和表分之邪尚縮腸中之滯依然尚宜輕泄紫蘇一錢防風一錢杏仁三錢前胡一錢炒陳皮一錢豆卷三錢紫菀五分炒枳殼一錢瓜蔞仁三錢敲再診汗暢熱解舌苔轉黃大腑稍行腹中反痛滯初運而未得盡下也法當導之蘇梗一錢五分蔞實三錢杵杏仁三錢杵豆豉三錢楂炭三錢建曲一錢五分炒熾實一錢五分麻仁三錢杵黑梔一錢五分丹皮一錢五分熱深厥深陳左痙厥陡起不省人事越兩時醒後復厥昨宵竟夜達旦而醒脈沉極數舌紫而晦刻下神識雖清舌脹言蹇二便不爽暑熱毒深伏經曰熱深者厥亦深是也勢恐再復速進清化法鎊犀角尖一錢五分炒銀花三錢連翹芯三錢元參一錢川楝子一錢炒小川連五分丹皮一錢五分人中黃五錢塊滑石三錢黑梔一錢五分鮮荷葉三錢綠豆四錢後下壽南按清滌膻中深伏之暑毒腹痛便秘陳左脾腎之陽素虧醉飽之日過勤腹痛拒按自汗如雨大便三日未行舌垢膩脈數實濕熱食滯團結於內非下不通而涉及陽虛之體非溫不動許學士溫下法原從仲聖大實痛之例化出今當宗之製附子五分上肉桂四分淡乾薑五分制川樸一錢炒枳實一錢五分生大黃四錢後下壽南按大承氣加薑附桂溫通下滯識到膽壯復診大腑暢行痛止汗收神思倦而脈轉虛細擬養胃和中北沙參三錢生甘草三分炒橘白一錢炒扁豆三錢川石斛三錢炒白芍一錢丹皮一錢五分腸癰韓左臍右腹痛拒按左腿短縮難仲身熱旬余有汗不解脈滑數舌垢糙此非外感表邪與疏散何涉乃濕熱蘊釀於腸已成癰瘍將潰幸在壯年尚能勝任擬清解化毒法質之專科然否淡豆豉三錢敗醬草三錢桃仁三錢丹皮一錢五分銀花三錢生苡仁三錢土貝三錢赤芍一錢五分生甘草五分炒枳實二錢瓜蔞仁二錢壽南按此以薏苡仁湯合敗醬散去附子為清解化毒法肝鬱江右情志抑鬱形神消瘦脅痛妨納者半載經停便艱者四月脈沉細數舌絳津干香燥破氣之味幾屬遍嘗推蕩通瘀之劑亦經屢進據此脈症觀之內火已熾津液已涸勢防失血之險何暇望其經通況久痛必傷絡抑鬱之症恆化火速與存陰冀少變幻亦未雨綢繆之謂也然怯象已萌難望復元鎊犀角七分阿膠一錢五分柏子仁三錢元參一錢生地四錢藿斛五錢火麻仁三錢丹參一錢炒女貞一錢五分煅瓦楞子一兩復診兩進存陰之法舌液稍潤而色絳稍淡胃納稍喜脈仍細數久病傷陰之症豈能迅速奏效擬轉清養必得怡情自愛乃吉生西洋參一錢五分炒阿膠一錢五分女貞子一錢五分川楝子七分炒大生地五錢麥冬一錢五分柏子仁三錢煅瓦楞一兩炒丹參一錢丹皮一錢少陰症王左灼熱旬余咽痛如裂舌紅起刺且口乾不思湯飲汗雖暢表熱猶壯脈沉細兩尺空豁煩躁面赤肢冷囊縮顯系少陰證據誤服陽經涼藥苟讀聖經何至背謬若此危險已極計惟背城借一但病之來源名目雖經一診道破尚慮鞭長莫及耳勉擬仲聖白通湯加膽汁一法以冀挽回為幸淡附子一錢細辛三分炒懷膝一錢蔥白三個上肉桂五分半夏一錢五分牡蠣七錢豬膽汁一個和入微溫服壽南按淡附細辛為少陰引經報使之藥復診少陰之惡款悉除少陰之虛波旋見古法古方信不誣也邇既僥倖於萬一慎勿怠忽以致復製附子五分炒杞子一錢五分五味十粒煅磁石四錢大熟地八錢炒杜仲三錢雲苓三錢煅牡蠣七錢誤補成痞江左平素胃納過量滯積層層脈道窒塞固見細伏病初余曾議下惜乎未服而聽周半池先生拘執於脈竟作虛治今歷旬日矣欲嘔不嘔欲便不便胸脘高突俯仰坐臥無一可適脈形愈細愈伏下證悉在而脹痛極甚汗冷肢冷足冷舌質燙光咽關燙腫詢系必得滾湯頻咽膈間方可稍緩其脹其誤補以致痞滿也明矣擬宗許學士溫脾湯復以辛滑開痞之法即能奏效為幸製附子五分肉桂三分乾薑五分炒川椒二分細辛六分生大黃四錢後下製厚朴一錢枳實一錢五分製半夏一錢五分復診大便暢通痞滿頓消脈道始通診得濡細脾胃大傷之後慎飲食為至要擬以和中制川樸七分炒扁豆三錢旋覆花一錢五分包川石斛三錢焦六曲三錢炒橘白一錢老蘇梗一錢五分郁痹程右竟日思悲半載納減詢非惱怒感觸所藉在病人亦不知悲從何來一若放聲號泣乃爽快睡醒之際特甚余如默坐亦然韓昌黎云凡人之歌也有思哭也有懷出於口而為聲者其皆有弗平者乎夫悲哀肺主之寢則氣窒醒則流通想其乍醒之際應通而猶窒焉是以特甚揆之脈象右寸細數而小滑伏火挾痰有諸或因有所驚恐驚則氣結結久成痹痹則升降失常出納呆鈍胃氣日餒耳擬以開結通痹為先何急急於補也旋覆花一錢五分包元參一錢炒竹茹一錢五分瓜蔞皮一錢五分薤白頭三錢紫菀七分橘絡一錢水安息三分烊入生鐵落兩許用鐵錘開水擂盆內研百遍取清汁一小杯衝入復診兩進開結通痹之後悲哀之態頓釋咯痰黃厚胃納稍思脈之滑數亦緩其痰火痹結也明矣擬以清泄降繼之補不可投豈妄談哉炙桑皮一錢五分炒竹茹一錢五分蔞霜一錢五分紫菀五分杏仁三錢黑梔一錢五分丹皮一錢五分橘絡一錢冬瓜子三錢絲瓜絡一錢虛熱陸左身熱兼旬杳不思納脈細而靜神倦嗜臥汗已絡續自來舌已化而質淡自病迄今消散之藥未止先天既薄奚堪消磨盪滌夫過表則藩籬疏豁過消則脾胃告竭其苦於不學無術以致虛實莫辨金匱曾有病人向里睡一條一似為此症而設幼科諒未見耳余雖門外漢進補可許轉機人參一錢沙參三錢川斛三錢炙草三分於術一錢五味七粒橘白一錢穀芽一兩痧隱王右風溫發痧子表熱壯甚汗不肯達病交五日痧子乍透而著涼驟縮表熱反減胸悶口渴舌淡紅少苔咳嗽痰不爽診脈細數神識時糊肺胃之邪熱不從表達而有欲陷之勢經曰冬傷於寒春必病溫從太陽克入而伏藏於少陰兼值歲初春風特甚又感風邪是從太陰縮縛二氣之邪今得溫暖而發取汗本非易事何況徒以辛溫散之夫里邪已化為熱風邪又化為火試以薪炊鍋而勿潤之以水欲逼其氣蒸作汗汗之汁何從運至不且鍋將裂乎急進辛涼解肌法庶幾雲行雨施品物咸亨也拙擬若此未識專科先生以為何如生麻黃五分杏仁三錢射干五分蟬蛻一錢土貝母三錢生石膏五錢桔梗一錢炒牛蒡一錢五分杵連翹一錢五分檉柳五錢枇杷葉露一兩衝入復診汗達未暢表熱復揚痧子隱約膚中欲透不透舌質已絳口渴引飲神志尚是時矇邪熱既侵營分內傳最捷不得不清營泄邪並進專科猶戀戀荊防余不知其何意也鎊犀角一錢麻黃四分連翹一錢五分杏仁三錢生石膏五錢葛根七分桔梗一錢赤芍一錢五分丹皮一錢五分前胡一錢再診痧子暢透表熱大減汗亦暢矣悶亦舒矣神志清而渴飲較減惟舌猶絳脈猶數陰分已傷良由取汗遲之所誤耳擬存陰泄熱細生地四錢桑葉一錢五分連翹二錢前胡一錢桔梗一錢淡豆豉三錢丹皮一錢五分黑梔一錢五分杏仁三錢冬溫春發黃右初病肝氣旋即發熱始以肝氣治繼從新感治病情漸劇又宗濕溫治乃未究來源見病治病硬裝硬派因循玩怠者已旬日矣診得左脈弦細而數舌苔干自口苦自病以來從無汗泄據是脈證乃冬溫春發系藏於腎而發於少陽其始似肝氣非肝家本病少陽之邪欲發泄而涉及厥陰蓋肝與膽表裡也當從少陽和解擬小柴胡加減柴胡五分炒淡芩一錢五分黑梔一錢五分淡姜渣三分豆卷三錢炒枳殼一錢陳皮一錢復診越三日據述未服柴胡更用香開涼藥症變神志模糊額汗多而呵欠頻頻脈左虛數誤開欲脫之象已著惟時半夜前藥未遠姑待天明越九日又邀再診脈細如絲神志散漫便下溏黑過多舌黑肥潤不渴乃脾腎之陰陽垂絕經云真臟之色見矣如何猶認作陽明熱灼而投犀角石膏等劑顧公始末主其事赧然無從措手爰與之議轉回陽救逆之法顧公執筆在手諸藥聽議獨於附子一味擬用生者三錢顧公只敢用制者五分乃與之論前賢救逆之旨而竟茫然莫辨可嘆主人在旁亦以重用附子為駭聞反和曰姑從輕用可乎噫誰敢強人之難也詰朝仍與顧公同診病果轉機諸款皆減脈仍細微兩尺有滑數之形乃謂顧公曰昨方系壞症救逆今見是脈恐其復熱惜哉昨方之附子輕而不能牢固腎陽仍歸汗脫顧公毅然以為一味純虛安有復熱之理只需峻補可矣余因辭不與議戌刻復邀診脈據述竟日平善並無他變及診其脈滑數之形外浮尺膚已熱熱復發矣陽隨汗越勢必然也按是症始作泛常肝氣治一誤也發熱作新感治二誤也熱甚作濕溫扭陽明治三誤也柴胡不服而更香開四誤也以寒涼重傷臟陽五誤也繼見臟陽垂絕而猶不敢以生附子三錢與一兩五錢之熟地並進此誤中之更誤也嗟呼一病也而堪數誤耶余雖未專其政屬在知交姻誼是以與之竭力挽回乃以必不至死之症而竟至於莫可救藥者是豈死於病耶死於藥耶直死於醫也余甚惜之因記其始末為醫者鑑肝邪犯胃程右惱怒傷肝木火犯胃入膈支撐胸背嘔吐血塊痰涎不納不便舌白苔膩胃為水穀之海多氣多血之腑性喜通降所畏倒逆經此氣火沖斥濕濁乘機錯亂倘肆其猖狂厥逆立至若再侮土泄瀉必增左脈弦硬右脈細軟谷不沾唇者已五日胃氣憊矣而嘔尚甚中無砥柱何恃不恐諸先生所進苦寒沉降蓋欲止其嘔血而順其氣誠是理也然內經云百病皆以胃氣為本苦寒性味又屬伐胃胃不能安藥力何藉拙擬苦溫以制肝之逆苦辛以通胃之陽並參奠安中氣冀其倒逆之勢得緩幸勿拘於見血畏溫之議臺人參一錢法半夏一錢五分薑汁炒川連三分旋覆花一錢五分淡吳萸二分川楝子七分炒川椒二分雲茯苓二錢交趾桂四分龍膽草三分二味同研細末飯和為丸即以藥湯送下復診嘔逆已止脹痛亦緩左脈弦硬固平右關歇止旋見土德大殘中氣亦竭急進補中立中仍參約肝制肝之法惟望胃納肯醒是幸臺人參一錢五分上肉桂三分生於術一錢五分炒白芍一錢五分雲茯苓三錢炙甘草三分再診脹痛大平嘔逆未復稍能納粥脈俱濡細胃氣漸有來復之機經云納穀則昌信不誣也再診脹痛大平嘔逆未復稍能納粥脈俱濡細胃氣漸有來復之機經云納穀則昌信不誣也人參一錢煨肉果三分白芍一錢五分炒橘白七分於術一錢五分煨木香三分炙甘草四分云茯神三錢穀芽一兩煎湯代水暑濕挾滯周左表熱九日有汗不解舌絳起刺燔渴引飲間作寒熱之象熱甚下午至夜神志時糊脈洪無力症固有邪有滯未明下不厭遲陽明經分之邪又傳少陽陽明腑分之滯灼傷津液極似大柴胡證而與脈象不符細繹症情汗下不按經旨延至正虛津劫既非陷里之神糊如何香開致使內傳此際之望滯通需俟津回液復擬宗仲聖人參白虎湯意參入景岳柴胡煎庶與脈證符合諸先生以為何如參鬚一錢柴胡四分知母一錢五分元參一錢黑梔一錢五分生石膏七錢藿斛七錢麥冬一錢五分竹葉三錢復診汗暢熱解煩渴已減舌絳淡而尖刺亦少津液稍回正氣較振脈數未平神志已爽少陽陽明之表分既清既泄腑分之滯尚待清潤毓陰而下也切勿因滯而再盪滌審證二字其難其慎臨時之應變平日之功夫耳鮮藿斛一兩細生地四錢知母一錢五分銀花一錢五分赤芍一錢五分花粉一錢五分丹皮一錢五分麻仁三錢蔞仁三錢溲秘潘右肝氣甚發之後小溲點滴不通少腹脹急子宮下墜脈沉數舌乾光上渴下秘水飲停膈脘腹胸脅並撐噫噯俯仰俱艱症已七日治惟滲利乃肝火濕火蘊結於下勢將厥逆姑擬河間法桂苓甘露飲復以辛通運下溲可望其通痛可望其減第子宮之腫與外瘍無異還仗專科調治肉桂五分吳萸二分炒小茴五分椒目五分橘核三錢生石膏七錢龍膽三分滑石三錢茯苓五錢豬苓一錢五分川楝子七分丹皮一錢飲症趙左飲邪十餘載遇冷即甚發發必脹痛徹背咳嘔氣逆邇來漸妨穀食脈形細滑據述向來力疾操勞安得不涉於虧然參地常投何以罔效蓋體雖宜補而病不安於補也夫有飲者中陽先虧飲為陰邪得以盤踞日甚一日即以水穀之精華亦必釀為痰涎而附於飲矣考之於古曰痰飲自漢時張長沙分立五飲門類皆曰當以溫藥和之宗苓桂術甘意參小青龍法肉桂五分乾薑四分旋覆花一錢五分包蘇子一錢炙草三分土炒白朮一錢五分細辛二分法半夏一錢五分雲苓五錢嗽血楊左身熱惡寒咳嗽痰艱血溢病經五日猶是風霜勞頓脈緊無汗舌白不渴症由寒縮於表熱鬱於裡清降潤嗆之品適相反矣傷寒論奪汗無血之例正合病情宜宗此旨調治幸勿畏虛因循以致劇生麻黃五分蘇葉七分連翹一錢五分杏仁三錢前胡一錢炒竹茹一錢五分桔梗一錢橘絡一錢絡瘀吳左嘔血盈碗紫色塊磊兩載中已見五次據述發病之前左脅肋近脘必痛吐後痛減不妨胃納診脈沉數有力面色晦滯詢由努力而起絡內凝瘀作痛但瘀血宜通瘀淨則止苟使根蒂常留則瘀漸積而必復發且有妨新血矣倘畏虛嗜補往往成癆者務宜宣通肝胃之絡旋覆花一錢五分包煎參三七一錢炒楂肉二錢丹皮一錢五分蔞仁三錢醋炒延胡一錢五分桃仁三錢炒赤芍一錢五分黑梔一錢五分紫降香三錢熱入血室徐右夏秋伏邪發熱汗雖有而不暢病交八日神糊夜甚經事非期先至脈弦且數胸悶口苦喜飲蓋暑濕熱為無形之邪不耐攻下且畏燥裂以致熱逼血分幸勿見神糊而妄投開藥症情雖劇就是脈證只宜輕清泄化擬宗熱入血室例姑宗少陽陽明治倘能轉瘧亦是穩機柴胡五分炒知母一錢五分丹皮一錢五分滑石三錢炒淡芩一錢青蒿一錢五分黑梔一錢五分炒竹茹一錢五分野薔薇露一兩沖誤下傷脾孫左新感風寒發熱本非重症過散過消之下脾氣大傷已見脈微便血尚謂里滯未楚清熱行瘀血如漏卮醫者自遁猶有天良診得脈細如絲肢冷自汗聞聲驚惕奄奄一息脾臟統血之源告竭矣危期至速勉擬峻補以冀轉機人參一兩炙草五錢五味子一錢煎湯徐徐灌下復診神思稍振下血較稀脈仍細微額汗尚多昨方簡約安中蓋恐雜以回陽顧陰反嫌剛猛不受今既轉機治當陰陽兩顧尚宜輕靈取效臺人參一錢五分製附子三分五味子七粒生於術一錢云神三錢熟地炭五錢煨肉果三分白芍一錢懷山藥一錢五分炒棗仁一錢再診下血已止神思來復胃納稍勝腹中未和脾臟大傷之後脈細難以驟振再進補養冀圖恢復但經此孟浪攻伐之後一兩月內務宜慎寒冷節飲食起居之間加意留神保養人參一錢炙黃耆一錢五分炒杞子一錢土炒白芍一錢五分懷山藥三錢熟地五錢於術一錢五分肉果四分炒棗仁一錢五分地榆炭一錢下痢林左腹痛下痢晝夜無度汗冷肢冷脈細舌白暑濕熱挾滯互結病經五日不減嗜酒中虛之體不克發熱而已見多汗傷陽多痢傷陰之險凡裡急後重腹痛者法當宜通口渴煩躁溲秘者又當清滲此際涉及虛波將至誠屬掣肘之極姑擬溫清並進宗瀉心意參以疏化邪滯若正氣保和之類何足恃耶附子五分制川樸七分桂木五分藿梗一錢五分赤苓三錢酒炒川連五分木香三分姜渣三分炒建曲一錢五分復診下痢減半赤白相雜肢冷較和汗亦稀少舌白苔膩不化裡急後重已緩診脈沉細腹中猶痛究屬中虛濕勝暑濕熱滯之結不能藉陽和運動尚非坦途也再擬溫中運邪一法製附子五分土炒白朮一錢五分制川樸七分炒防風一錢酒炒川連三分乾薑炭四分煨木香三分炒枳實七分丹皮炭一錢赤茯苓三錢膚中蝨葛左遍體蠕蠕作癢蝨從膚出形與白蝨無異腹稍狹而尾尖出則千萬忸怩難堪是症古所未有惟夏子益奇疾方中曾見亦但有主治之方未載其症之來源余於嘉慶年間見一名妓患此年餘而斃曾有閩廣人識其症曰此淫穢過甚浸漬於肌肉所化肉盡則死初見即治可救遲則百無一生今系素悉翁之稟賦極厚胃納兼人之量雖系尊年春服過冬如是天富精神何由而遇斯疾意者好食鮮發酷嗜腥羶二者氣味濃厚亦能浸漬於肌肉之間未可知也然肉既化為蟲矣人其何以堪耶邇已三月治亦莫及姑錄夏氏方試之觀此可為貪欲無厭好嗜鮮發者之戒白礬少許滴醋二三匙泡湯代茶黑癉吳左癉症多種黑者屬腎腎氣過損者曰女勞黑癉今肌膚舌質盡黑手指映日俱黯強壯之年腎陽早已不舉體雖豐腴腰軟不耐少坐脈弱神疲納減足冷顯然腎氣傷殘太甚尚謂北路風霜所致乎是症固非恆有昔聞瀆鎮曾有人患此遍處醫治皆曰風毒後遇顧西疇道破症名宗濕熱流入腎經主治而愈試即以此較之症雖同而虛實又異矣現屆深冬姑先治本需俟春暖陽和再商他法刻下赴任之舉盍早計寬緩之請血餘四兩洗淨豬油一斤熬至發枯取油盛貯一切食物中可以用油者俱用之製附子七分炒杞子一錢五分炒川柏一錢雲苓三錢熟地六錢生牡蠣七錢炒菟絲一錢五分茵陳一錢五分炒杜仲三錢復診前方已服二十餘劑肌膚之黑半化其勢漸轉陰黃形神大振胃納加餐且可耐勞理事矣春令雖交和暖未回再擬補養脾腎耐性調攝是妥人參一錢於術一錢五分炒沙苑三錢炒懷藥三錢炒杜仲三錢茵陳一錢五分炒杞子一錢五分炒菟絲二錢熟地一兩雲苓三錢炒川斷三錢澤瀉一錢五分再診膚色花斑症退陰黃較之黑癉淺一層矣培植脾腎之藥已守四十餘劑形神色脈俱屬平善節令將交驚蟄春暖之氣已和治當開泄腠理以滌膚斑內經曰必先歲氣無伐天和易曰待時而動何不利之有其斯之謂歟擬宗仲聖茵陳四逆法加減三劑即停接服丸劑可耳黑色退盡之時當在夏初製附子五分白朮一錢五分赤小豆三錢帶皮雲苓五錢生麻黃五分茵陳一錢五分炒川柏一錢交腸夏右大小便易位而出症名交腸當得之大怒大飽之後氣火先為錯亂升降先為失常以致清濁混淆水滓不按常道而行久則難治明礬七分敲如綠豆大用腐衣雙層包紮淡鹽湯送下日三服三日九服可愈咳白血江左咳吐似痰非痰似血非血左脈弦勁異常邇屆春升木旺木火上刑于肺金令不肅反為木克更兼終日嗜酒胃中常是熏蒸於上肺為嬌臟豈能耐此二火之日侮症見醫通曰咳白血不治倘能戒酒養性拋俗塵而怡情山水較之服藥勝多耳否則木葉落時恐難飛渡屬在世交用敢直陳望質之高見然乎否乎姑擬清降潤肺權慰目前之急金石斛三錢知母一錢五分杏仁三錢燕窩屑二錢包羚羊角一錢五分先煎川貝一錢五分竹茹一錢五分枇杷葉三錢去毛肝厥頭痛沈右巔頂頭痛左目失明痛甚則厥經事頻沖症患五六載春季特甚焉邇發正值春分其勢更劇脈虛弦數胃納不思左脅下痞癖攻逆下體畏冷異常臟陰大傷虛陽無制倘厥逆再勤必至脫也擬柔肝法即參補納意肉桂五分炒烏梅肉三分煅磁石四錢青鉛一個熟地一兩龍膽草三分炙鱉甲七錢復診症情俱減胃納稍進脈猶虛弦癖猶攻逆厥脫之險雖緩補納之法尚急前方去龍膽加淡吳萸三分濕痰內閉鄭左形凜汗漬脈濡神糊舌如傅粉沉睡痰逆素系嗜酒之體濕痰迷漫閉塞擾亂神明所致非陷也閉也慎勿開損擬達原飲意茅朮一錢五分法半夏一錢五分煨草果五分枳實皮四分制川樸一錢五分炒廣皮一錢白芷一錢山茨菇五分與枳實皮兩味磨汁衝入復診汗漬已收神志轉清藥後嘔痰盈碗嘔後漸醒脈猶濡細舌苔白膩瀰漫之勢雖除尚宜燥濕祛痰仍從太陰陽明主治參以運下茅朮一錢煨草果三分法半夏一錢五分炒青皮一錢椒目五分白朮一錢五分制川樸一錢白芥子一錢炒研炒陳皮一錢通草一錢假噎膈症沈左得食則嘔已延月餘形神疲乏宛如格症聽其言觀其人惟知明而動晦而休務農無怠者診脈左關弦數右關細軟舌白口苦寒熱往來汗之有無病者不知蓋少陽見症原有嘔惡揆其情任其嘔逆以致反胃厭谷胃氣日逆類似噎膈實由有邪蘊於少陽一逕胃氣未達據是脈證先泄少陽之邪為妥擬小柴胡意佐以辛通柴胡七分製半夏一錢五分制川樸七分炒川椒二分陳皮一錢紫蘇七分炒蘇子一錢青皮一錢淡姜渣五分後下復診前方本囑服兩劑據述服後壯熱大汗濕透衣被即思納粥因其效驗連服一劑今已吃飯惟力不充矣診其脈左關已軟右脈尚細與之和中黨參三錢炒歸身一錢五分炙甘草三分炒川斷一錢五分煨木香三分白朮一錢五分炒柴胡三分雲苓三錢陳皮一錢妊娠張右前歲春間產女夏季即病三瘧入秋乳汁已干經事一逕未至屈指今春已逾兩載夫產婦自乳往往經停固無足異至若因瘧而干理或有諸去秋瘧止之後何以經仍不至今見納減腹膨形瘦面黃遍體病態宛然乾血癆瘵無怪病人之急欲通經但脈滑流動孕象約將三月雖屬脈證不符還宜舍證從脈擬以丸藥緩圖之胎產金丹兩丸今先服一丸五日後再服一丸用川斷三錢煎湯送下香砂六君子丸四錢清晨開水送下後聞此婦八月內生男暑熱金左身熱煩躁有汗不解病交五日舌絳渴飲平素吐紅頻發感受暑熱脈濡細而表熱壯夫暑傷氣熱傷陰考內經云脈虛身熱得之傷暑今氣陰並傷已甚奚堪再與薷藿葛柴以重傷之急進立中存陰以和其熱宗仲聖人參白虎湯加減人參一錢麥冬一錢五分知母一錢五分生草四分五味子七粒生石膏五錢藿斛七錢粳米四錢包水炙桑葉一錢五分白荷花露一兩衝入復診熱解未淨煩躁大減舌絳較淡渴飲亦緩脈虛氣怯神倦嗜臥暑熱雖經清化氣陰告竭甚急此皆虛實莫辨斫伐過度所致最恐血症復來必至無從措手刻下留戀餘熱姑且置之勿論擬補元立中為主毓陰佐之人參一錢五分麥冬一錢五分炒知母一錢五分制首烏四錢白粳米四錢包炙黃耆二錢干藿斛四錢杵先煎炒棗仁一錢五分炙草三分伏邪馮左寒熱如瘧者旬日連絡無間者又五日矣醫者咸謂年老體虧餘邪留戀參朮地冬之類已投七劑診脈洪數彈指胸痞氣粗舌苔灰垢厚濁脘中按之痛胸前㾦未透日晡熱甚譫語神糊據是脈證有邪有滯所聞與所見殊屬霄壤矣但邪滯沾補愈膠愈結熏蒸於中內陷最速按法冶病猶易補救誤補實難此豈醫者之忽當自悔何以年尊也事在危急姑為醫病擬表裡並疏必得㾦從汗達庶有轉機柴胡六分前胡一錢連翹一錢五分豆卷三錢蔞實三錢杏仁三錢竹茹一錢五分枳實七分桔梗五分枳桔二味磨沖先服萊菔汁一盞攘入白荷花露一兩復診汗泄未暢㾦點未遍胸悶依然舌苔更厚右脈數大有力神志時慧時矇矢氣頻轉穢濁異常邪滯尚是膠結不通內傳之勢猶是捷徑補劑之功蓋亦偉耳再擬前法從少陽陽明手太陰透達柴胡五分前胡一錢杏仁三錢枳殼五分磨桔梗五分磨葛根一錢炒牛蒡一錢五分杵連翹三錢野薔薇露一兩衝入三診汗暢㾦布表熱較和胸悶舒而神志亦清右脈數而大便未通表邪既泄里滯宜行擬從陽明腑分主治仍參泄上之法但舌苔之垢膩灰濁倍於尋常病將兼旬猶未化動後恐驟然剝落又多變幻耳炒枳實一錢麻仁三錢黑梔一錢五分前胡一錢蔞實三錢杏仁三錢研連翹一錢五分炒竹茹一錢五分涼膈散七錢包後下四診大便暢通之後汗又大泄㾦布滿腹表熱微矣脈數緩矣痞悶既舒而漸納糜粥惟舌苔依然不化當慎反復桑葉一錢五分炒枳殼七分川石斛三錢炒銀花一錢五分丹皮一錢五分橘白一錢塊滑石三錢雲苓三錢五診白㾦暢布未回汗亦津津自泄熱解已淨便又續通反復之慮可免而舌苔驟剝即現光紅起裂脈左細數心煩少寐究因邪滯久蘊又以補劑助之以致旋見劫陰之險幸而㾦已透汗已暢大腑已通否則液涸風動昏陷之虞至易耳治病之難難在揠拔補救今忽於前者往矣履險如夷者獨任耳權擬救陰暫進蓋老年之陰氣傷則最難復者川連五分水炒生西洋參一錢麥冬一錢五分炒棗仁一錢五分阿膠蛤粉炒一錢五分鮮藿斛七錢云神三錢生甘草四分炒知母一錢五分炒丹皮一錢五分類中吳左水不涵木木無滋養內風旋擾暈僕神昏痰氣乘機上逆脈道因之上魚素屬嗜酒好嘗厚味中州之濕痰蘊釀久矣肢麻見於前歲已是中機微露邇值春升木火司令藉煩勞過度而發雖屬乘虛所致姑先順氣化痰俟其氣順痰降再商治本之法炒蘇子一錢五分杵烏藥五分旋覆花一錢五分包黃菊炭一錢鉤鉤三錢後下整杏仁三錢炒蒺藜三錢炒白芥子七分杵生石決明一兩鮮竹瀝一兩和入薑汁兩匙衝入復診昨宵子刻神志醒豁痰氣漸降眩暈亦平肢體可以自主肢末麻木尚甚痰火風擾亂之後治以育陰熄風化痰為要最怕呆補制首烏三錢旋覆花一錢五分包丹皮炭一錢黑芝麻三錢焙天冬一錢五分黃菊炭七分橘絡一錢炒竹菇一錢五分生石決明一兩鮮桑枝七錢蛔厥呂左吐蛔而厥者肝邪乘胃為多茲則脈數舌紅胃中伏火極重蛔不安而上竄況熱深者厥亦深治當宗苦辛寒法川連五分薑汁炒煅石膏五錢炒知母一錢五分炒枳實七分川楝子一錢炒川椒二分乾薑三分吳萸一分姜半夏一錢五分失音馬左風霜勞碌疊次受涼已化熱者蘊於肺絡絡不耐熱嗽血咽痛未化熱者尚縮於表肺如鐘磬金虛則鳴金實則喑滯邪則為實治從開泄法補肺潤肺之藥惜早進矣擬麻杏石甘湯加味生麻黃五分杏仁三錢射干五分百部一錢五分羚羊角一錢五分生石膏五錢生甘草三分桔梗七分浮石三錢絲瓜絡一錢五分產後腹痛丁右上臘嚴寒生產受寒涼甚當時瘀露云暢臍下陣痛迄今五月未止閱所服藥皆宗產後宜溫之例固屬近是惜未考經穴經隧耳譬之鎖則買矣何以不付以匙買者不知賣者當知病者難曉醫者當明致使遠途跋涉幸遇善與人配匙者肉桂二錢細辛五分同研細末飯粒為丸均五服每晨一服風水江左旬日內遍體皆腫膚色鮮明始也原有身熱不慎風而即止亦無汗泄診脈浮緊氣喘促小溲閉舌白不思飲症系水濕之邪藉風邪而鼓行經隧是以最捷倘喘甚壅塞氣機亦屬致危之道治當開鬼門潔淨府為要著生麻黃五分整杏仁三錢蘇子一錢炒杵赤苓皮三錢桂木五分干浮萍一錢五分生苡仁三錢紫菀七分大腹皮一錢五分椒目五分外用麻黃浮萍紫蘇羌活防風生薑各五錢閉戶濃煎遍體揩熨不可冒風脾癉陳左內經論濕熱蘊釀於脾胃發為脾癉口甜舌膩納穀運遲其味之甜非甘美也蓋五味變常所泛古法以蘭草湯主之取其香芳醒中推陳致新之義茲屆初夏正當濕熱蒸變之際是以脈數溲少納更減而形神萎困土德不振之至最恐中滿變端擬醒脾和胃運濕化熱主治白朮三錢土炒干佩蘭一錢五分制川樸七分通草一錢煨草果三分西茵陳一錢五分炒苡仁三錢炒建曲一錢五分炒半夏曲一錢五分陽越林左病交八日壯熱汗多脈虛浮而中沉兩按俱空面色㿠白舌質少神喜暗畏明懶言怕煩一派虛陽外越之象所服表散獨計麻黃已三錢矣童質單薄病輕藥重使之蹈虛脫之險見亦寒心酸鼻也急進補正回陽固表收汗之法人參一錢生綿耆一錢五分五味子二分炒棗仁三錢云神三錢製附子五分生白朮一錢五分煅牡蠣五錢炙甘草三分復診熱解汗收虛陽收斂脈轉濡細神思大倦幸而童體得有轉機之速詢知三房只此一子蓋亦險矣醫藥一事誠孽海也可不慎乎人參一錢蜜炙耆一錢五分五味子二分云神三錢炙甘草五分於術一錢五分焙山藥三錢制首烏三錢炒棗仁三錢寒縮肝胃陸左左脈不和口苦舌白半月以來納日減神日倦自謂望八之年衰老無疑向醫討補竟與之補熟知早春之寒縮伏肝胃之樞宜從少陽宣泄雖非補劑三服可望霍然勸翁勿藥有喜柴胡四分炒白朮一錢蔻仁三分研沖炒青皮五錢雲苓三錢乾薑三分炒川椒十五粒炒六曲三錢炒陳皮七分瓜果傷中謝左腹痛便溏脈細舌白涼風已至猶嗜瓜果倘奔走勞碌者尚可運行兄系呆坐書算豈不停頓況涉房事未遠腎陽未復腎為胃之關脾胃為表裡腹痛尚小恙也後當填之擬仿大順散意加減煨肉果三分淡乾薑三分帶皮杏仁三錢砂炒煨木香四分炒白朮一錢獨活一錢酒炒青皮五分酒炒柴胡三分酒炒太陰三瘧劉左三瘧兩載形瘦腹脹始也尚能強納茲則厭谷不思脈濡便溏腿足浮腫素系勞力之體不恃穀食而酒肉是飽中氣常虧瘧邪久戀虛益虛而病益深矣擬補正敵邪分期以進茅朮一錢柴胡四分酒炒藿香一錢五分炒常山五分煨草果三分炒青皮七分制川樸五分煨木香三分鱉甲煎丸七粒藥汁送下用井河水煎來期預服潞黨參三錢煨肉果四分干佩蘭一錢五分陳皮一錢土炒白朮一錢五分煨木香四分製半夏一錢五分青皮五分空腹服腸覃金右腹滿如妊經水按期而至邇將九月起居胃納如常專科曰鼠胎十二月乃產診脈細小腹無脹墜考內經曰婦人重身何以別之對曰身有病而無邪脈也又曰手少陰脈動甚者妊子也以外似妊而非妊者分條並及曰月事以時下者名腸覃月事不以時下者名石瘕腸覃生於腸中不妨月事石瘕生於胞中故妨月事由此論之是即腸覃既曰專科乃昧於聖經而以不經之談為證據乎擬按經旨勿攻奪之意著想其惟和理氣血聊佐推敲老蘇梗一錢五分炒桃仁三錢炒黑丹皮一錢五分瓜蔞仁三錢陳香櫞一錢歸尾一錢五分炒橘核三錢生瓦楞一兩咳嗽王左冬月咳嗽極似著寒嗽陣急而痰湧白膩腹膨脹而便溏溲短脘膈鳴響脈濡舌白全是一派濕象何以發於冬令意者今秋陰雨過多水退極遲水濕之氣感而伏焉內經原有秋傷於濕冬生咳嗽之文余幼時讀到此篇嘗疑其濕字或應燥字今見是症信有諸矣夫惟學然後知不足讀書雖易會悟最難耳擬以輕宣泄化法苡仁生三錢通草一錢干佩蘭一錢蔻殼七分旋覆花一錢包杏仁三錢赤苓三錢大腹皮一錢五分蘇子三錢橘絡一錢晨瀉倪右五載晨瀉起自產後納減形瘦足浮日甚一日培中分利之藥遍嘗罔效詢系每在五鼓必腹中雷鳴切痛晨起一瀉之後痛除而竟日安然脈已濡細又非挾滯其痛也始終不更其瀉也不專責於脾矣產之時痧子雜來產後五年中風痧頻發箇中有奧妙焉且不道破俟同學見之一想土炒白朮一錢五分荊芥炭一錢炒防風一錢霞天曲一錢五分炒煨肉果四分檉柳炭一錢五分桔梗一錢丹皮炭一錢生甘草三分小赤豆三錢復診五載之累一朝頓釋蓋晨瀉一症腹膨脹則有之而必雷鳴切痛者特少是以不專責於脾虛而旁敲側擊庶得窺其真諦信哉臨證之望聞問切四字不可缺一也茲既幻想見效不必更以方藥就原方再服十劑可以拔其根矣原方十帖風毒伏肺孫右哮症數年交秋必發發則淹延兼旬需見如膠如飴之痰則平夢蘭先生調治多年為斯疾之異也而問道於盲詢其數載中起居平昔所畏者熱所喜者涼而鮮發未慎膏肓之俞平靜之日常冷發作之時灼熱夫肺臟屬金金旺於秋伏風層疊蘊絡延為風毒清虛之臟性嬌且潔奚肯容其盤踞於絡是以藉旺令必與之爭衡耳風為陽邪其性易於化火化熱是以發病之際背俞灼熱而目亦赤焉預擬一方俟臨發時服之夏季沐浴常以百部濃煎暢熨其胸背務使津津有汗最佳管見若此妥否俟裁生麻黃三分紫菀五分百部一錢炒枳殼五分射干三分鎊羚羊角一錢杏仁三錢前胡一錢橘絡七分土貝三錢絲瓜絡一兩冬瓜子五錢二味煎湯代水三四劑為則勿過服春溫畢左身熱據述解在兩候僅以不納不便為病診脈弦數舌根灰膩胸脘痞悶汗未曾達詢系先輩曾誤服柴胡後人永不敢嘗今乃少陽陽明邪滯互阻柴胡為少陽泄邪要藥何能拘疑若不早為泄邪通滯勢必陡然內陷之變擬表裡並疏切勿因循玩怠柴胡五分枳殼五分磨杏仁三錢陳皮一錢豆卷三錢連翹一錢五分桔梗一錢前胡一錢復診汗稍泄胸悶更甚㾦不暢熱壯神糊病已兼旬邪滯乍動躍躍欲陷之勢已見邪滯之久蘊可知矣病情正當猖熾何敢擅許坦途柴胡六分枳實五分磨連翹一錢五分丹皮一錢五分葛根一錢蔞仁三錢杵炒竹菇一錢五分黑梔一錢五分真珠粉三分研細調服薔薇露一兩衝入三診汗已暢達疹㾦大透表熱漸將解矣脈緩悶除舌未化而頻轉矢氣大便之下不遲也擬轉清泄法參以潤下冀其腑分一通庶無變幻前此可謂養病以待其變幸而速與透達不則懊悔莫及桑葉一錢五分炒枳實一錢杏仁三錢丹皮一錢五分連翹一錢五分豆卷三錢蔞仁三錢麻仁三錢黑梔一錢五分炒竹茹一錢五分內傷脾胃朱左年將及冠體貌未揚腹滿且硬大便溏結不常瓜果生冷一向性之所好童質內傷脾胃即是疳膨食積反有食不厭飽之態蛔已病矣消克太峻恐損傷難復擬培中疏中並進麥食生冷切宜痛戒白朮一錢五分土炒川連五分酒炒烏梅肉炭二分川楝子七分煨肉果四分炒川椒二分炒枳實五分檳榔三分炒五穀蟲一錢五分炙雞內金一錢五分食復汪左濕熱乍愈之時強食太牢雖曰未多病熱又復冒險之至後當自慎擬宗食復例分消淡豆豉三錢炒熾實一錢炒萊菔子三錢陳皮一錢黑山梔一錢五分楂炭三錢廣藿梗一錢五分蘇梗一錢五分陳稻柴一握洗淨煎湯代水嘔血馬左素稟躁急酷嗜麥食而勿嘗穀食者蓋有年矣夫肝用有餘之體而麥為肝谷致使剛臟大夫和平血嘔盈盆純是紫色凝塊嘔後火升肝陽有升無降但肝為藏血之臟將軍之性不動則已動則猖獗若不向靜思順再多惱怒難料其不復蓋氣為血之帥也擬苦降直折之法龍膽草三分鹽水炒川連五分鹽水炒川楝子一錢生地炭四錢真蘆薈五分烊入烏梅二分炒枯炙石決一兩藕節炭三錢青鉛二個疫症吳左壯熱神糊陡然而發脈數大而混糊失序舌垢膩而層疊厚布矢氣頻轉小溲自遺脘腹按硬氣粗痰鳴既非尋常六氣所感亦非真中類中之症觀其濈濈自汗汗熱而不黏指轉側自如四體無強直之態舌能伸縮斷不近中設使外感何致一發即劇而安能汗肯自來倘宗傷寒法先表后里下不厭遲之例待其斃矣曾讀吳又可先里後表急下存陰之論否蓋是症也一見藍斑胃已爛而胞絡已陷迅速異常盍早議下尚可僥倖諸同學以為然否生軍八錢後下制川樸一錢淡芩一錢五分檳榔五分枳實一錢磨沖煨草果四分知母一錢五分陳皮一錢復診神志時清表熱自汗腹猶拒按矢氣尚頻便下黏膩極穢者未暢小溲點滴如油脈數略有次序舌苔層布垢濁胃中氾濫蒸變之勢尚是凶勇必得再下需俟里滯漸楚然後退就於表吳又可治疫之論蓋亦闡發前人所未備甚至三下而退走表分者若作尋常發熱症治之豈不謬乎生軍五錢後下炒枳實一錢五分銀花二錢炒知母一錢五分制川樸一錢炒川連五分丹皮一錢五分滑石三錢元明粉一錢五分後下三診大腑暢通悉是如醬如飴極穢之屎腹已軟而神已爽表熱壯而汗反艱舌苔半化脈數較緩渴喜熱飲小溲稍多此際腑分之蒸變乍平病邪退也表分當以疏達先里後表之論信不誣也柴胡五分炒枳實一錢制川樸七分通草一錢法半夏一錢五分藿香一錢五分連翹一錢五分陳皮一錢赤苓三錢大腹皮一錢五分洗四診表熱隨汗就和舌苔又化一層脈轉細矣神亦倦矣病去正虛之際當以和養中氣佐輕泄以滌餘熱守糜粥以俟胃醒慎勿以虛而早投補劑補之則反復立至也桑葉一錢五分川石斛三錢炒扁豆三錢炒半曲一錢五分生甘草三分豆卷三錢炒橘白一錢炒苡仁三錢丹皮一錢五分傷寒朱左發熱惡寒頭項強痛無汗胸痞脈浮緊細症屬正傷寒南方所罕見詢系連朝營墓辛勤屆在嚴寒曠野深受外邪太陽表證悉具宗仲聖不汗出而煩躁者大青龍湯主之生麻黃五分整杏仁三錢生薑五分大棗二枚防風一錢桂枝五分生石膏三錢甘草三分羌活七分復診病甫兩日太陽證未罷而陽明少陽證已悉具可知南人稟賦柔弱其傳經之迅速若此汗既未暢擬三陽並泄生麻黃四分柴胡四分白芷七分連翹一錢五分姜渣五分葛根七分羌活五分杏仁三錢黑梔一錢五分大棗一枚三診汗暢熱解煩躁已除脈轉細小形疲體酸嗜臥而思納穀矣其發也凶悍其傳也迅速其退也亦易易究屬質弱易感易達不若北方之風氣剛勁稟賦厚而腠理實必至傳變遍六經乃已是症若宗三時六氣治之勢必淹纏幾候耳擬和營衛法桂枝四分炒秦艽一錢五分炒橘白一錢姜渣三分後下防風七分炒桑枝五錢雲苓三錢黑棗一枚賁豚胡左少腹塊磊上攻腹脘其力猛而痛勢劇轉瞬之間腹中鳴響則塊磊一陣向下即平症名賁豚者因其性情蹤跡行止類似江豬耳然考其症有三犯肺之賁豚屬心火犯心之賁豚屬腎寒臍下悸欲作賁豚者屬水邪今系腎水寒邪所發體屬陽虧所致擬以真武湯參賁腸湯意雲苓五錢川芎五分炒小茴五分炒歸尾一錢製半夏一錢五分附子五分炒白芍一錢酒炒橘核三錢李根白皮一兩煎湯代水呃邱左身熱未止驟來呃逆呃之勢震動臥床呃之聲聞之客坐今已六日熱雖解矣呃猶極甚詢其來由系半夜口乾思飲健者嗜臥懶為烹茗答曰茶已冷未幾又睡著欲飲者料為煮熱答應者仍在夢中半晌不見茶來渴愈甚而氣火升騰大聲疾呼之下健者強起應之仍是答以茶已冷怒氣勃勃就冷飲之呃隨是起其為氣逆作呃也顯然與腎虛呃逆者迥異但呃最傷胃且易變端亦非小恙也姑與順氣通降之法即能平善乃妥淡吳萸三分旋覆花一錢五分包烏藥五分法半夏一錢白石英四錢炒川椒三分炒蘇子三錢沉香七分生石決一兩復診呃逆已平語形氣促胃氣傷而涉腎關矣喘將作之證也診脈關尺俱浮元海根松喘來即脫極險之機從何施設擬丹溪法填納下元急則治本之計大熟地六錢炒炭杞子一錢沉香片一錢煅磁石四錢臺參鬚一錢炒杜仲三錢炙龜版一兩煅牡蠣七錢坎炁一條洗炙蚧尾一對三診呃未復而喘未作關尺之脈已向平語言稍舒胃納不逆病機只緣一怒險關幾難逃脫若非眼明手快此際不知如何原方再服兩劑當更易處再議痹症毛左四體疼痛遇冷則發甚至頸項強直右臂不能高舉症得五載咸謂氣血就虧而一向服補有增無減症由風寒濕三氣雜受始於筋絡經隧漸侵骨節痹症已成尚恐及痿內經曰風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹痹久延痿痿久處瘓日漸日深之病也豈易驟拔姑與宣絡泄邪威靈仙酒炒一錢羌活五分炒秦艽一錢五分旋覆花一錢五分包獨活一錢酒炒炒狗脊一錢五分鮮桑枝酒炒二兩油松節一兩劈二味煎湯代水暑熱石左表熱微汗自泄氣餒脈濡神倦言懶消散連與氣陰愈耗曾見聖經脈虛身熱得之傷暑文義否夫暑傷氣熱傷陰高年氣陰就衰不耐暑熱交加縱使高堂廣廈難禁口鼻吸受奚必奔走日中而後暑熱可侵蓋夏令之感受最雜務審來由以投藥石倘強逼其汗過戕其中不但表熱不解竊恐意外之變幻不旋踵而至矣擬仿東垣清暑益氣法去其疏泄以立中為主必得應手乃妥人參一錢白朮一錢五味七粒歸鬚七分炙草三分黃耆一錢水炙麥冬一錢米炒棗仁一錢炒升麻二分復診表熱又微自汗尚多呵欠頻來呃忒間作神思益倦而更懶矣脈虛且軟而溲反勤矣昨已進補猶且虛波疊至設再消散今將補救莫及急擬溫補護真陽而建立中氣為目前之要著人參一錢半黃耆一錢五分蜜炙五味十粒丁香二分大棗一枚劈桂枝三分杞子一錢炒黑炙草四分白芍一錢炒姜渣三分後下三診自汗已收身熱已淨神思來復呵欠呃忒並止脈猶濡細溲便之勤未減中下兩虧氣陰俱乏再擬脾腎雙補法人參一錢炒鬆熟地五錢炒萸肉一錢煨益智五分炙甘草三分於術一錢五分炒杞子一錢土炒懷藥三錢云神三錢中暍顧左膏粱之體豈耐疲勞於赤日暑熱之氣乘虛吸受於臟腑致暈僕途間神志且朦所幸舌本不強小溲未遺脈浮數尚是中暍之輕者先與西瓜汁暢飲擬以生鐵落飲開瀉之生鐵落二三兩淘淨用鐵錘同鐵落於擂盆內和以開水磨汁澄清飲之血痢計左暑濕熱下痢始系赤白相雜晝夜數十餘次旬日後痢雖減而純下血矣蓋痢瘧之門諸法畢備虛實並涉全憑六經證據今已傷及肝腎病情最深非易治者姑先以清熱存陰宗厥陰下痢之條擬白頭翁湯復以黃連阿膠湯意白頭翁三錢水炒川連五分鹽水炒川柏一錢丹皮炭一錢五分地榆炭一錢北秦皮一錢阿膠一錢五分蛤粉炒白芍一錢五分乾荷葉蒂三個復診下血較昨雖半減而其來必陣下腸中已無堵塞之象腎關亦見下撤之勢最恐轉脫擬宗昨方參桃花湯加減赤石脂四錢包川連四分水炒阿膠一錢五分蛤粉炒地榆一錢乾薑炭五分炒川柏一錢白芍一錢五分丹皮一錢炙甘草三分白粳米四錢包赤石脂二錢滴水水丸藥湯送下三診血下緩而大減脈微神倦氣陰並乏矣堵塞存陰之法尚不可撤擬就昨方加立中意原方加人參一錢另煎衝入疝氣陳左數載疝疾與年並深始則因寒因濕繼涉肝虛腎乏考內經論疝責之八脈後賢闡發又以七疝各分經次之寒熱虛實久暴諸法可謂詳且明也今疝發之時喘且汗肝腎之虛八脈之虧明矣擬顧本溫運參入辛香通腎之意肉桂三分炒小茴五分酒炒獨活一錢酒炒香附一錢五分炒枯熟地五錢細辛二分酒炒橘核三錢沉香片四分炒牛膝四分茯苓一錢五分炒杜仲一錢五分上方五服後以十服為末水泛丸繼之每服三錢開水送下癧痰施左惱怒抑鬱內火自生火能爍痰氣結痰凝火之性上炎痰隨之上竄結核成串於左項安保右項之不發壯年樸實之體而